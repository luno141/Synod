version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: synod-postgres
    environment:
      POSTGRES_DB: synod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:0.5.5
    container_name: synod-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: synod-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/synod?schema=public
      CHROMA_URL: http://chroma:8000
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - postgres
      - chroma
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: synod-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
